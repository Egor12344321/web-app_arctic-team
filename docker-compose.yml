version: "3.8"

services:

  postgres:
    container_name: database
    image: postgres:13
    environment:
      POSTGRES_DB: arctic_team
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: egor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arctic_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d arctic_team" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arctic_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  backend-java-service:
    container_name: backend-java-service
    build:
      context: ./backend-java-service
      dockerfile: Dockerfile.prod
    ports:
      - "8080:8080"
    environment:
      SPRING_REDIS_HOST: redis-cache
      SPRING_REDIS_PORT: 6379
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "false"
      JWT_SECRET: ${JWT_SECRET:-HZIKG4GAOn9AeozDachZGyMZkDSoX8nJEkCCvFMva4h}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-egor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arctic_team}
      GIGACHAT_KEY: ${GIGACHAT_KEY:-key}
      ANALYTICS_PROVIDER: ${ANALYTICS_PROVIDER:-gigachat}
    networks:
      - arctic_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - with-python
      - without-python

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-python-service:
    container_name: python-service
    build: ./backend-python-service/api
    environment:
      POSTGRES_DB: arctic_team
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: egor
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AUTHORIZATION_KEY: ${AUTHORIZATION_KEY:-1234567}
    ports:
        - "8000:8000"
    networks:
        - arctic_network
    depends_on:
      postgres:
        condition: service_healthy
      backend-java-service:
        condition: service_healthy
    profiles:
      - with-python

  frontend:
      container_name: frontend
      build: ./frontend
      ports:
        - "3000:3000"
      networks:
        - arctic_network

volumes:
  postgres_data:
  redis_data:

networks:
  arctic_network:
    driver: bridge